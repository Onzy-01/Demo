<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habidade Café</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
color:#fff;
overflow-x:hidden;
}

/* Background animation */
body::before{
content:"";
position:fixed;
width:300%;
height:300%;
background:
radial-gradient(circle,#8b5e34 0%,transparent 18%),
radial-gradient(circle,#ffd166 0%,transparent 10%),
radial-gradient(circle,#2b1b10 0%,transparent 18%);
opacity:.12;
animation:bgmove 40s linear infinite;
z-index:-1;
}

@keyframes bgmove{
from{transform:translate(0,0);}
to{transform:translate(-500px,-500px);}
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 8%;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
}

nav h2{color:#FFD166;}
nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
}
nav a:hover{color:#FFD166;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
}

.box{
background:rgba(255,255,255,.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(15px);
max-width:650px;
animation:float 4s ease-in-out infinite;
}

.hero h1{
font-size:clamp(30px,5vw,60px);
color:#FFD166;
}

.hero p{
margin:15px 0;
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 30px;
background:linear-gradient(45deg,#ffb84d,#ff7b00);
color:#fff;
text-decoration:none;
border-radius:30px;
}

/* SECTIONS */
section{
padding:80px 10%;
}

.title{
text-align:center;
color:#FFD166;
font-size:32px;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.06);
padding:25px;
border-radius:15px;
}

/* CONTACT */
.contact{
text-align:center;
background:#181818;
}

footer{
text-align:center;
padding:20px;
background:black;
color:#888;
}

/* FLOAT */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* MOBILE FIX */
@media(max-width:768px){
nav div{display:none;}
}
</style>

</head>

<body>

<nav>
<h2>☕ Habidade</h2>
<div>
<a href="#about">About</a>
<a href="#features">Features</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section class="hero">
<div class="box">
<h1>Habidade Café</h1>
<p>Beautiful café in Noida with coffee, food & calm vibes.</p>

<a class="btn"
href="https://www.google.com/maps/dir/?api=1&destination=28.5746,77.3852"
target="_blank">
📍 Get Directions
</a>

</div>
</section>

<section id="about">
<h2 class="title">About</h2>

<div class="cards">
<div class="card">☕ Coffee Experience</div>
<div class="card">🌿 Peaceful Ambience</div>
<div class="card">🍽 Great Food</div>
</div>
</section>

<section id="contact" class="contact">
<h2 class="title">Visit Us</h2>
<p>Sector 104, Noida</p>
<p>+91 87997 79389</p>
</section>

<footer>
Made with ❤️ for Habidade Café
</footer>

</body>
</html>
